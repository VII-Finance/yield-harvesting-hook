[profile.default]
src = "src"
out = "out"
libs = ["lib"]
gas_limit = 100_000_000_000
optimizer = true
optimizer_runs = 200
solc = "0.8.26"
evm_version = "cancun"
bytecode_hash = "none"
cbor_metadata = false
no_match_contract = "MorphoVaultsTest|EETH_EulerVaultWETH_UnderlyingAssetsSwapHookTest|stETH_eWETH_UnderlyingAssetsSwapHookTest|EulerVaultsUnderlyingAssetsSwapTest"


[fuzz]
runs = 256

[invariant]
runs = 64
depth = 20
fail_on_revert = true

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}" 
base= "${BASE_RPC_URL}"
unichain = "${UNICHAIN_RPC_URL}"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
